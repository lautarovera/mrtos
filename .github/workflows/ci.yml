# mRTOS CI: every stage here was verified locally before being added.
#
#   host        - suite on the POSIX port, -Werror
#   sanitizers  - same suite under ASan+UBSan (catches lifetime/UB bugs
#                 the kernel's pointer-heavy list code could hide)
#   coverage    - gcovr line coverage of kernel/mrtos.c, gate at 95%
#                 (the ~3% miss is by-design-unreachable code: the
#                 post-retirement trap and the default overflow hook)
#   static-analysis - cppcheck over the kernel and host-buildable ports
#   msp430      - suite on the GNU MSP430 ISA simulator + FR5994 image
#                 at -Os, toolchain cached from TI's public mirror;
#                 section sizes land in the job summary so size
#                 regressions are visible per PR
name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  MSP430_GCC_VER: 9.3.1.11
  MSP430_SF_VER: 1.212

jobs:
  host:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Host suite (-Werror)
        shell: bash
        run: |
          cmake -B build-host -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_FLAGS="-Wall -Wextra -Werror"
          cmake --build build-host --parallel
          ctest --test-dir build-host --output-on-failure \
                --output-junit junit.xml | tee host-tests.log
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-test-results
          path: |
            host-tests.log
            build-host/junit.xml

  sanitizers:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Host suite under ASan+UBSan
        shell: bash
        run: |
          cmake -B build-asan -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all"
          cmake --build build-asan --parallel
          ctest --test-dir build-asan --output-on-failure | tee sanitizer-tests.log
      - name: Upload sanitizer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sanitizer-results
          path: sanitizer-tests.log

  coverage:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Kernel line coverage >= 95%
        shell: bash   # -o pipefail, so the tee pipe can't mask a gcovr failure
        run: |
          cmake -B build-cov -DCMAKE_BUILD_TYPE=Debug \
                -DCMAKE_C_FLAGS="--coverage" -DCMAKE_EXE_LINKER_FLAGS="--coverage"
          cmake --build build-cov --parallel
          ctest --test-dir build-cov --output-on-failure
          # One gcovr pass, three outputs: browsable HTML artifact
          # (coverage.html annotated source, coverage.functions.html
          # per-function table), a markdown table for the job summary,
          # and the 95% line gate.
          mkdir -p coverage-html
          uvx gcovr --root . --filter 'kernel/' \
                    --html-details coverage-html/coverage.html \
                    --markdown coverage.md \
                    --fail-under-line 95 build-cov \
            || { cat coverage.md >> "$GITHUB_STEP_SUMMARY"; exit 1; }
          cat coverage.md >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: coverage-html/

  static-analysis:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: cppcheck (kernel + host-buildable ports)
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q cppcheck
          cppcheck --enable=warning,portability --inline-suppr \
                   --error-exitcode=1 --suppress=missingIncludeSystem \
                   -Ikernel -Iport/posix -Itest \
                   kernel/mrtos.c port/posix/port.c port/msp430sim/port.c

  msp430:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Cache TI msp430-gcc toolchain
        id: toolchain-cache
        uses: actions/cache@v4
        with:
          path: ~/toolchains
          key: msp430-gcc-${{ env.MSP430_GCC_VER }}-sf-${{ env.MSP430_SF_VER }}
      - name: Download toolchain (TI public mirror)
        if: steps.toolchain-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/toolchains && cd ~/toolchains
          BASE=https://software-dl.ti.com/msp430/msp430_public_sw/mcu/msp430/MSPGCC/9_3_1_2/export
          curl -sO "$BASE/msp430-gcc-${MSP430_GCC_VER}_linux64.tar.bz2"
          curl -sO "$BASE/msp430-gcc-support-files-${MSP430_SF_VER}.zip"
          tar xjf msp430-gcc-${MSP430_GCC_VER}_linux64.tar.bz2
          python3 -m zipfile -e msp430-gcc-support-files-${MSP430_SF_VER}.zip .
      - name: Simulator suite + target image
        shell: bash   # -o pipefail, so the tee pipe can't mask a runner failure
        run: |
          export MSP430_GCC_DIR=$HOME/toolchains/msp430-gcc-${MSP430_GCC_VER}_linux64
          export MSP430_SUPPORT_DIR=$HOME/toolchains/msp430-gcc-support-files/include
          uv run tools/run_tests.py --sim --target | tee ci-run.log
          { echo '### MSP430 build'; echo '```'
            sed -n '/=== summary ===/,$p' ci-run.log; echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload firmware image and build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: msp430-build
          path: |
            build-msp430/mrtos_fr5994.elf
            ci-run.log
